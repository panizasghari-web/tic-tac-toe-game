<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="./assets/css/output.css" />
  </head>
  <body>
    <main
      class="w-screen h-screen overflow-x-hidden overflow-y-hidden flex justify-center items-center bg-pink-900"
    >
      <!-- ============================================ OVERLAYS ============================================ -->
      <section
        class="overlays w-screen h-screen fixed hidden justify-center items-center t-0 r-0 b-0 l-0 z-50 bg-[#3b031ae8] text-7xl md:text-9xl text-pink-400 font-DynaPuff-SemiBold"
      >
        <div
          class="x-wins w-full h-full hidden flex-col justify-center items-center"
        >
          <p>"X" WINS!</p>
          <button
            class="go-back w-36 h-16 mt-16 rounded-[5px] cursor-pointer flex justify-center items-center border-2 text-2xl border-pink-400 hover:bg-pink-200 transition-all duration-200 ease-linear"
          >
            go back
          </button>
        </div>
        <div class="o-wins w-full h-full hidden flex-col justify-center items-center">
          <p>"O" WINS!</p>
          <button
            class="go-back w-36 h-16 mt-16 rounded-[5px] cursor-pointer flex justify-center items-center border-2 text-2xl border-pink-400 hover:bg-pink-200 transition-all duration-200 ease-linear"
          >
            go back
          </button>
        </div>
        <div class="draw-game w-full h-full hidden flex-col justify-center items-center">
          <p>DRAW!</p>
          <button
            class="go-back w-36 h-16 mt-16 rounded-[5px] cursor-pointer flex justify-center items-center border-2 text-2xl border-pink-400 hover:bg-pink-200 transition-all duration-200 ease-linear"
          >
            go back
          </button>
        </div>
      </section>
      <!-- ============================================ CHOOSING SEC ============================================ -->
      <section
        class="choosing-section w-[80%] sm:w-[70%] md:w-[50%] h-[90%] rounded-[50px] bg-pink-300 flex flex-col justify-center items-center shadow-[0px_0px_15px_rgba(0,0,0,0.35)]"
      >
        <div
          class="header w-full h-1/6 flex justify-center items-center font-DynaPuff-SemiBold border-b-2 border-pink-900"
        >
          <p class="text-pink-900 text-3xl md:text-5xl text-center">
            Tic Tac Toe
          </p>
        </div>
        <div
          class="choosing w-full h-5/6 flex flex-col justify-center items-center text-pink-900 font-DynaPuff-Regular"
        >
          <!-- ================================================= -->
          <div
            id="choose-symbol"
            class="w-full h-1/4 flex flex-col justify-center items-center"
          >
            <div
              class="choose-player-text w-full h-1/3 text-[1rem] sm:text-2xl flex justify-center items-center"
            >
              <p>Select Your Symbole:</p>
            </div>
            <div
              class="choose-player-buttons w-[90%] h-2/3 flex justify-evenly items-center"
            >
              <button
                data-player="X"
                class="player-selection-btn w-[15%] md:w-[10%] text-2xl p-1 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                X
              </button>
              <button
                data-player="O"
                class="player-selection-btn w-[15%] md:w-[10%] text-2xl p-1 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                O
              </button>
            </div>
          </div>
          <!-- ================================================= -->
          <div
            id="choose-mode"
            class="w-full h-1/4 flex flex-col justify-center items-center"
          >
            <div
              class="choose-mode-text w-full h-1/3 text-[1rem] sm:text-2xl flex justify-center items-center"
            >
              <p>Choose Mode:</p>
            </div>
            <div
              class="choose-mode-buttons w-[90%] h-2/3 flex justify-evenly items-center"
            >
              <button
                data-mode="pvp"
                class="mode-selection-btn w-[48%] md:w-[47%] lg:w-[35%] text-[.75rem] sm:text-[1rem] p-1.5 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                Player vs Player
              </button>
              <button
                data-mode="ai"
                class="mode-selection-btn w-[48%] md:w-[47%] lg:w-[35%] text-[.75rem] sm:text-[1rem] p-1.5 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                Player vs AI
              </button>
            </div>
          </div>
          <!-- ================================================= -->
          <div
            id="choose-difficulty"
            class="w-full h-1/4 flex flex-col justify-center items-center"
          >
            <div
              class="choose-difficulty-text w-full h-1/3 text-[1rem] sm:text-2xl flex justify-center items-center"
            >
              <p>Choose Difficulty:</p>
            </div>
            <div
              class="choose-difficulty-buttons w-[90%] h-2/3 flex justify-evenly items-center"
            >
              <button
                data-level="easy"
                class="difficulty-selection-btn w-[30%] md:w-[25%] text-1xl p-1.5 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                Easy
              </button>
              <button
                data-level="medium"
                class="difficulty-selection-btn w-[30%] md:w-[25%] text-1xl p-1.5 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                Medium
              </button>
              <button
                data-level="hard"
                class="difficulty-selection-btn w-[30%] md:w-[25%] text-1xl p-1.5 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                Hard
              </button>
            </div>
          </div>
          <!-- ================================================= -->
          <div
            id="choose-start"
            class="w-full h-1/4 flex flex-col justify-center items-center"
          >
            <div
              class="choose-start-text w-full h-1/3 text-[1rem] sm:text-2xl flex justify-center items-center"
            >
              <p>Start The Game:</p>
            </div>
            <div
              class="choose-start-buttons w-[70%] h-2/3 flex justify-evenly items-center"
            >
              <button
                class="start-selection-btn w-[30%] md:w-[25%] text-1xl p-1.5 border-2 border-pink-900 rounded-[5px] flex justify-center items-center cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-all duration-200 ease-linear"
              >
                Start
              </button>
            </div>
          </div>
          <!-- ================================================= -->
        </div>
      </section>
      <!-- ============================================ BOARD GAME ============================================ -->
      <section
        class="gaming-board-sec w-[85%] sm:w-[65%] md:w-[50%] lg:w-[40%] xl:w-[35%] max-w-130 h-[85%] max-h-[90vh] bg-pink-300 rounded-[50px] shadow-[0px_0px_15px_rgba(0,0,0,0.35)] hidden flex-col"
      >
        <div
          class="score-panel w-full h-1/6 flex justify-evenly items-center border-b-2 border-pink-900 text-pink-900 font-DynaPuff-Regular"
        >
          <div class="x-counts">
            <span class="text-3xl mr-4">x:</span
            ><span class="x-counts-span text-2xl">0</span>
          </div>
          <div class="o-counts">
            <span class="text-3xl mr-4">O:</span
            ><span class="o-counts-span text-2xl">0</span>
          </div>
          <div class="draw-counts">
            <span class="text-3xl mr-4">D:</span><span class="draw-counts-span text-2xl">0</span>
          </div>
        </div>
        <!-- =========================================================================== -->
        <div
          class="gaming-board-div w-full h-4/6 flex-1 border-b-2 border-pink-900 flex justify-center items-center p-4 sm:p-6"
        >
          <div
            class="board-grid w-full max-w-75 sm:max-w-90 md:max-w-100 h-[90%] grid grid-cols-3 grid-rows-3 overflow-hidden p-1"
          >
            <div
              data-index="0"
              class="cell bg-pink-300 border-2 border-t-0 border-l-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="1"
              class="cell bg-pink-300 border-2 border-t-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="2"
              class="cell bg-pink-300 border-2 border-t-0 border-r-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="3"
              class="cell bg-pink-300 border-2 border-l-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="4"
              class="cell bg-pink-300 border-2 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="5"
              class="cell bg-pink-300 border-2 border-r-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="6"
              class="cell bg-pink-300 border-2 border-l-0 border-b-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="7"
              class="cell bg-pink-300 border-2 border-b-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
            <div
              data-index="8"
              class="cell bg-pink-300 border-2 border-r-0 border-b-0 border-pink-900 flex justify-center items-center text-4xl sm:text-5xl md:text-6xl text-pink-900 font-DynaPuff-SemiBold cursor-pointer hover:bg-pink-200 transition-colors duration-200 ease-linear select-none"
            ></div>
          </div>
        </div>
        <!-- =============================================================== -->
        <div
          class="game-resets w-full h-1/6 flex justify-evenly items-center text-pink-900 font-DynaPuff-Regular text-center p-4"
        >
          <button
            class="restart-game w-[40%] md:w-[35%] text-[.75rem] md:text-[1rem] flex justify-center items-center border-2 border-pink-900 rounded-[5px] p-1.25 cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-colors duration-200 ease-linear"
          >
            Restart Game
          </button>
          <button
            class="reset-board w-[40%] md:w-[35%] text-[.75rem] md:text-[1rem] flex justify-center items-center border-2 border-pink-900 rounded-[5px] p-1.25 cursor-pointer hover:shadow-[0px_0px_5px_rgba(0,0,0,0.6)] hover:bg-pink-200 transition-colors duration-200 ease-linear"
          >
            Reset Board
          </button>
        </div>
      </section>
    </main>
    <script src="./assets/js/master.js"></script>
  </body>
</html>
